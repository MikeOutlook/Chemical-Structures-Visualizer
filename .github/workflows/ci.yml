name: Chemical Structures CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install rdkit pandas openpyxl Pillow

    - name: Verify RDKit installation
      run: |
        python -c "from rdkit import Chem; print('RDKit version:', Chem.__version__)"

    - name: Run the chemical image generator
      run: |
        python generate_chemical_images.py

    - name: Verify output files exist
      run: |
        test -f chemical_structures_with_images.xlsx
        test -d chemical_images
        ls chemical_images/*.png | wc -l

    - name: Upload generated artifacts
      uses: actions/upload-artifact@v4
      with:
        name: chemical-images
        path: |
          chemical_structures_with_images.xlsx
          chemical_images/
        retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install flake8
      run: pip install flake8
    - name: Lint Python code
      run: |
        flake8 generate_chemical_images.py --max-line-length=120 --ignore=E501,W503
